services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: newshub-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-newshub.ini
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: mysql
      DB_DATABASE: newshub_pro
      DB_USERNAME: newshub
      DB_PASSWORD: secret
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - newshub

  nginx:
    image: nginx:1.27-alpine
    container_name: newshub-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - newshub

  mysql:
    image: mysql:8.4
    container_name: newshub-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: newshub_pro
      MYSQL_USER: newshub
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newshub

  redis:
    image: redis:7-alpine
    container_name: newshub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - newshub

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: newshub-horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: mysql
      DB_DATABASE: newshub_pro
      DB_USERNAME: newshub
      DB_PASSWORD: secret
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - newshub

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: newshub-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: mysql
      DB_DATABASE: newshub_pro
      DB_USERNAME: newshub
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - redis
      - mysql
    networks:
      - newshub

  pulse:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: newshub-pulse
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan pulse:check
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      - redis
      - mysql
    networks:
      - newshub

volumes:
  mysql_data:
  redis_data:

networks:
  newshub:
    driver: bridge
