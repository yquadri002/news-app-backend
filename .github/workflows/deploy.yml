name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      rollback:
        description: 'Rollback to previous release'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: newshub_deploy
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, redis

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Prepare deployment environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php -r "
          \$env = file_get_contents('.env');
          \$env = str_replace('APP_ENV=local', 'APP_ENV=${{ github.event.inputs.environment || 'staging' }}', \$env);
          \$env = str_replace('APP_DEBUG=true', 'APP_DEBUG=false', \$env);
          \$env = str_replace('DB_DATABASE=newshub_pro', 'DB_DATABASE=newshub_deploy', \$env);
          \$env = str_replace('DB_PASSWORD=', 'DB_PASSWORD=root', \$env);
          \$env = str_replace('CORS_ALLOWED_ORIGINS=', 'CORS_ALLOWED_ORIGINS=https://app.newshub.pro', \$env);
          file_put_contents('.env', \$env);
          "

      - name: Environment validation
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan about

      - name: Run migrations
        run: php artisan migrate --force

      - name: Validate production configuration
        if: ${{ (github.event.inputs.environment || 'staging') == 'production' }}
        run: php artisan infrastructure:validate-production

      - name: Run tests before deploy
        run: composer install --no-interaction --prefer-dist && php artisan test

      - name: Build Docker image
        run: docker build -f docker/php/Dockerfile.prod -t newshub-pro:${{ github.sha }} .

      - name: Deploy to server
        if: ${{ !github.event.inputs.rollback }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "DEPLOY_HOST secret not configured; skipping remote deploy."
            exit 0
          fi
          echo "Deploying ${{ github.sha }} to ${{ github.event.inputs.environment || 'staging' }}"
          echo "${DEPLOY_KEY}" > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd /var/www/newshub && git pull && docker compose pull && docker compose up -d --build && php artisan migrate --force"

      - name: Rollback deployment
        if: ${{ github.event.inputs.rollback }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "DEPLOY_HOST secret not configured; skipping rollback."
            exit 0
          fi
          echo "${DEPLOY_KEY}" > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd /var/www/newshub && git checkout HEAD~1 && docker compose up -d --build"

      - name: Post-deploy health check
        run: |
          php artisan serve --host=127.0.0.1 --port=8088 &
          SERVER_PID=$!
          sleep 3
          curl --fail --retry 5 --retry-delay 2 http://127.0.0.1:8088/up
          curl --fail --retry 5 --retry-delay 2 http://127.0.0.1:8088/health
          kill $SERVER_PID

      - name: Notify Sentry of deploy
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          curl --fail -sL https://sentry.io/api/0/organizations/${SENTRY_ORG}/releases/ \
            -X POST \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d "{\"version\":\"${{ github.sha }}\",\"projects\":[\"${SENTRY_PROJECT}\"]}" || true
