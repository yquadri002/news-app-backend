services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    env_file:
      - .env.production
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 1G
    networks:
      - newshub

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - app_public:/var/www/html/public:ro
    depends_on:
      - app
    deploy:
      replicas: 2
    networks:
      - newshub

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - newshub

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: always
    command: php artisan horizon
    env_file:
      - .env.production
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 1G
    depends_on:
      - redis
    networks:
      - newshub

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: always
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file:
      - .env.production
    deploy:
      replicas: 1
    networks:
      - newshub

  pulse:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: always
    command: php artisan pulse:check
    env_file:
      - .env.production
    deploy:
      replicas: 1
    networks:
      - newshub

volumes:
  redis_data:
  app_public:

networks:
  newshub:
    driver: bridge
